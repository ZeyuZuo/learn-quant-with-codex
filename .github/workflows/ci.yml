name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: python

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

  web:
    name: Web checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate course content
        run: npm run validate:course

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
